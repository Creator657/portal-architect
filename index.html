<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Portal Architect</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<h1>Portal Architect V0.3</h1>

<p>Design the perfect Nether portal network.</p>

</header>


<main>

<section class="card">

<h2>Mother Portal</h2>

<label>
Overworld X
</label>

<input id="motherX" type="number">


<label>
Overworld Z
</label>

<input id="motherZ" type="number">


<label>
Grid Radius
</label>

<input id="radius" type="number" value="2" min="1" max="15" step="1">


<button id="generateBtn">
Generate Grid
</button>

<p id="formError" style="color:#ff8a8a; font-size:14px; margin-top:10px;"></p>
<p id="radiusNotice" style="color:#ffd54a; font-size:14px; margin-top:10px;"></p>

</section>


<section id="output">

<h2>&nbsp;</h2>

<div id="results">
    
</div>

</section>


</main>

<footer id="commitFooter" style="text-align:center; padding:20px; color:#8a6fa8; font-size:13px;"></footer>


<script src="main.js"></script>

</body>

</html>
